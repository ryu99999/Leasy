          60% { transform: scale(1.25); opacity: 1; }
          100% { transform: scale(1); }
        }

        {/* Envelope */}
        <div style={{
          position: "relative", width: 140, height: 140, marginBottom: 36,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: phase === "sending"
            ? "envelopeEnter 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, envelopePulse 1.6s ease-in-out 0.8s infinite"

        }}>
          <svg width="120" height="90" viewBox="0 0 120 90" fill="none">

                <stop offset="1" stopColor="#b8dafc"/>
              </linearGradient>
              <linearGradient id="envFlap" x1="60" y1="0" x2="60" y2="50" gradientUnits="userSpaceOnUse">
                <stop offset="0" stopColor="#bfe0ff"/>
                <stop offset="1" stopColor="#9ccbf9"/>
              </linearGradient>
              <filter id="envShadow" x="-4" y="2" width="128" height="96" filterUnits="userSpaceOnUse">
                <feDropShadow dx="0" dy="4" stdDeviation="6" floodColor="#6ba8e6" floodOpacity="0.18"/>
              </filter>
            </defs>
            {/* Shadow */}
            <rect x="2" y="2" width="116" height="86" rx="14" fill="transparent" filter="url(#envShadow)"/>
            {/* Body — single gradient */}

          </svg>

          {phase === "done" && (
            <div style={{
              position: "absolute", bottom: 12, right: 6,
              width: 36, height: 36, borderRadius: 18,
              background: C.gn500,
              display: "flex", alignItems: "center", justifyContent: "center",

            </div>
          )}
        </div>

        {/* Status text */}
        <div style={{
          ...T.t3(700), color: C.g900, textAlign: "center", marginBottom: 8,
          ...(phase === "done" ? { animation: "textFadeUp 0.4s ease 0.2s both" } : {}),
        }}>

        </div>
        {phase === "done" && (

            ...T.t6(400), color: C.g500, textAlign: "center",

                animation: `dotPulse 1.2s ease-in-out ${i * 0.2}s infinite`,
              }} />
            ))}
          </div>
        )}
      </div>
      {phase === "done" && (
        <BCTA label="완료" onClick={() => { completeStep("a4"); go("home_post"); }} />
      )}
    </>
  );
}

      <SBar />
      <Nav title="보증금 반환 요청서" onBack={() => go(from || "b2a")} />

        <div style={{ padding: "20px 24px" }}>
          {/* 요청서 카드 */}

// MAIN APP
// ═══════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("home_pre");
  const [lastHome, setLastHome] = useState("home_pre");
  const [selectedPath, setSelectedPath] = useState("sc");
  const [bank, setBank] = useState("");
  const [accountNum, setAccountNum] = useState("");
  const [prevScreen, setPrevScreen] = useState("");
  const [completedSteps, setCompletedSteps] = useState({ contract: 1 }); // key: checkedAt order (0=not done)
  const [resetKey, setResetKey] = useState(0);
  const completeStep = (key) => {
    setCompletedSteps(prev => {
      if (prev[key]) return prev;
      const maxAt = Math.max(0, ...Object.values(prev));
      return { ...prev, [key]: maxAt + 1 };
    });
  };
  const resetScreen = () => {
    setCompletedSteps({ contract: 1 });
    setSelectedPath("sc");
    setBank("");
    setAccountNum("");
    setResetKey(k => k + 1);
  };
  const go = (s) => {
    if (s === "home") { setScreen(lastHome); return; }
    if (s.startsWith("home_")) setLastHome(s);
    setPrevScreen(screen);
    setScreen(s);
  };

  const isHome = screen.startsWith("home_");

  const screenMap = {
    home_pre: <HomeScreen go={go} phase="계약 전" completedSteps={completedSteps} completeStep={completeStep} />,
    home_checked: <HomeScreen go={go} phase="계약 확인 완료" completedSteps={completedSteps} completeStep={completeStep} />,
    home_post: <HomeScreen go={go} phase="계약 직후" completedSteps={completedSteps} completeStep={completeStep} />,
    home_post_done: <PostDoneScreen go={go} />,
    home_live: <HomeScreen go={go} phase="거주 중" completedSteps={completedSteps} completeStep={completeStep} />,
    home_expiry: <HomeScreen go={go} phase="만기 접근" completedSteps={completedSteps} completeStep={completeStep} />,
    home_postexpiry: <HomeScreen go={go} phase="만기 도래" completedSteps={completedSteps} completeStep={completeStep} />,
    home_dispute: <HomeScreen go={go} phase="분쟁 중" completedSteps={completedSteps} completeStep={completeStep} />,
    home_dispute_pending: <HomeScreen go={go} phase="발송 대기" completedSteps={completedSteps} completeStep={completeStep} />,
    home_dispute_sent: <HomeScreen go={go} phase="내용증명 발송 완료" completedSteps={completedSteps} completeStep={completeStep} />,
    home_done: <ContractDoneScreen go={go} />,
    a0_capture: <A0Capture go={go} />,
    a0_extracted: <A0Extracted go={go} />,
    a0_review: <A0Review go={go} from={prevScreen} />,
    agent_rec: <AgentRec go={go} fromChecked={prevScreen === "home_checked"} />,
    a2: <A2Screen go={go} completeStep={completeStep} />,
    a3: <A3Screen go={go} completeStep={completeStep} />,
    a4_1: <A4_1Screen go={go} />,
    a4_guide: <A4GuideScreen go={go} />,
    a4_free: <A4FreeScreen go={go} />,
    a4_confirm: <A4ConfirmScreen go={go} />,
    a4_2: <A4_2Screen go={go} completeStep={completeStep} />,
    a4_sent: <A4SentScreen go={go} completeStep={completeStep} />,
    b1a_main: <B1aMain go={go} />,
    b1a_exit: <B1aExit go={go} />,
    b1a_exit_sent: <B1aExitSent go={go} />,
    b1a_renew: <B1aRenew go={go} />,
    home_expiry_done: <HomeScreen go={go} phase="만기 대응 중" completedSteps={completedSteps} completeStep={completeStep} />,
    home_exit_done: <HomeScreen go={go} phase="퇴거 신청 완료" completedSteps={completedSteps} completeStep={completeStep} />,
    b1a_result: <B1aResult go={go} />,
    b1b_main: <B1bMain go={go} />,
    b1b_dispute: <B1bDispute go={go} />,
    b2a: <B2aScreen go={go} from={prevScreen} />,
    b2b: <B2bScreen go={go} />,
    b2b_agree: <B2bAgree go={go} />,
    b2b_agree_sent: <B2bAgreeSent go={go} />,
    b2b_return: <B2bReturn go={go} />,
    home_agree_wait: <HomeScreen go={go} phase="합의 대기" completedSteps={completedSteps} completeStep={completeStep} />,
    b21_compose: <B21Compose go={go} from={prevScreen} bank={bank} setBank={setBank} accountNum={accountNum} setAccountNum={setAccountNum} />,
    b21_preview: <B21Preview go={go} bank={bank} accountNum={accountNum} />,
    b21_sent: <B21Sent go={go} />,
    b4: <B4Screen go={go} from={prevScreen} selectedPath={selectedPath} setSelectedPath={setSelectedPath} />,
    b3_sc: <B3Screen go={go} fixedPath="sc" />,
    b3_po: <B3Screen go={go} fixedPath="po" />,
    b3_med: <B3Screen go={go} fixedPath="med" />,
    b3_move: <B3MoveScreen go={go} from={prevScreen} />,
  };

  // Group chips by flow
  const groupColors = { "계약 전": C.b600, "계약 직후": C.b500, "거주 중": C.g700, "만기 접근": C.o600, "만기 도래": C.o800, "분쟁 중": C.r500 };
  const currentGroup = SCREENS[screen]?.group || GROUPS[0];
  const [openGroup, setOpenGroup] = useState(currentGroup);

  // 화면 전환 시 해당 그룹 자동 열기
  useEffect(() => {
    const g = SCREENS[screen]?.group;
    if (g) setOpenGroup(g);
  }, [screen]);

  // ─── 플로우차트 네비게이션 데이터 ───
  const FLOW_DEFS = {
    "계약 전": [["home_pre"], ["a0_capture"], ["a0_extracted"], ["a0_review"], ["home_checked"]],
    "계약 직후": [["home_post"], ["a4_guide"], ["a4_free"], ["a4_confirm"], ["a4_2"], ["a4_sent"], ["home_post_done"]],
    "거주 중": [["home_live"]],
    "만기 접근": [["home_expiry"], ["b1a_main"], ["b1a_exit", "b1a_renew"], ["b1a_exit_sent", "__spacer"], ["home_exit_done", "home_expiry_done"], ["__nav_postexpiry", "b1a_result"], ["__nav_live", "__nav_exit_back"]],
    "만기 도래": [["home_postexpiry"], ["b1b_main"], ["home_done", "b1b_dispute"]],
    "분쟁 중": [["home_dispute"], ["b2a"], ["b2b", "b21_compose"], ["b2b_agree", "b21_preview"], ["b2b_agree_sent", "b21_sent"], ["home_agree_wait", "home_dispute_sent"], ["b2b_return", "b4"], ["__nav_done", "b3_sc", "b3_po", "b3_med"]],
  };

  const chipH = 26;
  const chipGap = 4;
  const connW = 24;
  const aS = 4;
  const calcYs = (n, H) => {
    const total = n * chipH + (n - 1) * chipGap;
    const start = (H - total) / 2;
    return Array.from({ length: n }, (_, i) => start + chipH / 2 + i * (chipH + chipGap));
  };

  const FlowConn = ({ pN, nN, H, gc }) => {
    if (pN === 1 && nN === 1) {
      const y = H / 2;
      return <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
        <line x1={0} y1={y} x2={connW - aS} y2={y} stroke={gc} strokeWidth={1.5} />
        <polygon points={`${connW},${y} ${connW - aS * 1.5},${y - aS} ${connW - aS * 1.5},${y + aS}`} fill={gc} />
      </svg>;
    }
    const lYs = calcYs(pN, H);
    const rYs = calcYs(nN, H);
    const minY = Math.min(...lYs, ...rYs);
    const maxY = Math.max(...lYs, ...rYs);
    return <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
      {lYs.map((y, i) => <line key={`l${i}`} x1={0} y1={y} x2={connW / 2} y2={y} stroke={gc} strokeWidth={1.5} />)}
      <line x1={connW / 2} y1={minY} x2={connW / 2} y2={maxY} stroke={gc} strokeWidth={1.5} />
      {rYs.map((y, i) => (
        <g key={`r${i}`}>
          <line x1={connW / 2} y1={y} x2={connW - aS} y2={y} stroke={gc} strokeWidth={1.5} />
          <polygon points={`${connW},${y} ${connW - aS * 1.5},${y - aS} ${connW - aS * 1.5},${y + aS}`} fill={gc} />
        </g>
      ))}
    </svg>;
  };

  return (
    <div style={{
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      background: C.g100,
      display: "flex", flexDirection: "column",
      minHeight: "100dvh",
      overflowX: "hidden",
    }}>
      {/* ─── 상단 칩 네비게이션 ─── */}
      <style>{`
        * { box-sizing: border-box; }
        body { overflow-x: hidden; }
        .chip-nav::-webkit-scrollbar{display:none}
        .chip-nav{-ms-overflow-style:none;scrollbar-width:none;overflow-x:auto}
        .no-scrollbar::-webkit-scrollbar{display:none}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .no-scrollbar *::-webkit-scrollbar{display:none}
        .no-scrollbar *{-ms-overflow-style:none;scrollbar-width:none}
        .nav-wrap {
          position: sticky; top: 0; z-index: 200;
          background: #fff;
          border-bottom: 1px solid #e5e8eb;
          width: 100%; max-width: 100vw;
          overflow: hidden;
        }
        .device-outer {
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          padding: 20px 0 40px;
          background: #f2f4f6;
        }
        .device-frame {
          width: 390px;
          height: 844px;
          background: #fff;
          border-radius: 24px;
          overflow: hidden;
          box-shadow: 0 20px 60px rgba(0,0,0,0.12);
          display: flex;
          flex-direction: column;
          flex-shrink: 0;
        }
        @media (max-width: 430px) {
          .device-outer {
            padding: 0;
            background: #fff;
            align-items: stretch;
          }
          .device-frame {
            width: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            flex: 1;
          }
        }
      `}</style>
      <div className="nav-wrap">
        {/* 1단: 그룹 버튼 */}
        <div className="chip-nav" style={{ display: "flex", gap: 6, padding: "8px 12px" }}>
          {GROUPS.map(group => {
            const isActive = openGroup === group;
            const isCurrent = currentGroup === group;
            const gc = groupColors[group] || C.g600;
            return (
              <button key={group} onClick={() => setOpenGroup(isActive ? null : group)} style={{
                padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer",
                ...T.t7(isActive || isCurrent ? 600 : 400), whiteSpace: "nowrap",
                background: isActive ? gc : "transparent",
                color: isActive ? C.w : isCurrent ? gc : C.g500,
                transition: "all 0.15s", flexShrink: 0,
                boxShadow: !isActive && isCurrent ? `inset 0 0 0 1.5px ${gc}` : "none",
              }}>{group}</button>
            );
          })}
        </div>
        {/* 2단: 플로우차트 — 항상 가로 스크롤 */}
        {openGroup && FLOW_DEFS[openGroup] && (() => {
          const flow = FLOW_DEFS[openGroup];
          const gc = groupColors[openGroup] || C.g600;
          const maxN = Math.max(...flow.map(col => col.length), openGroup === "계약 전" || openGroup === "계약 직후" ? 3 : 1);
          const disputeExtra = openGroup === "분쟁 중" ? 16 : 0;
          const H = maxN * chipH + (maxN - 1) * chipGap + 8 + disputeExtra;
          return (
            <div className="chip-nav" style={{ display: "flex", alignItems: "stretch", padding: "0 12px 8px" }}>
              {flow.map((col, ci) => (
                <React.Fragment key={ci}>
                  <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: (openGroup === "분쟁 중" && ci === 2) ? chipGap + disputeExtra : chipGap, height: H, flexShrink: 0, alignItems: "center", position: "relative" }}>
                    {col.map(id => id === "__spacer" ? (
                      <div key={id} style={{ height: chipH, flexShrink: 0, display: "flex", alignItems: "center", alignSelf: "stretch" }}>
                        <div style={{ flex: 1, height: 1.5, background: C.g300 }} />
                      </div>
                    ) : id.startsWith("__nav_") ? (
                      <button key={id} onClick={() => { const t = { __nav_done: "home_done", __nav_live: "home_live", __nav_exit_back: "b1a_exit", __nav_postexpiry: "home_postexpiry" }[id]; if (t) go(t); }} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none",
                        background: "linear-gradient(135deg, #e8f3ff, #c9e2ff)",
                        cursor: "pointer",
                        ...T.s13(500), whiteSpace: "nowrap", height: chipH,
                        color: C.b700, transition: "all 0.15s", flexShrink: 0,
                        display: "flex", alignItems: "center", gap: 4,
                      }}>
                        {SCREENS[id]?.label || id}
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.b700} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                    ) : (
                      <button key={id} onClick={() => go(id)} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none", cursor: "pointer",
                        ...T.s13(screen === id ? 600 : 400), whiteSpace: "nowrap", height: chipH,
                        background: screen === id ? gc : C.g100,
                        color: screen === id ? C.w : C.g600,
                        transition: "all 0.15s", flexShrink: 0,
                      }}>{SCREENS[id]?.label || id}</button>
                    ))}
                    {/* 분쟁 중: 반환 의사 → 내용증명 작성 열 내부 하향 화살표 */}
                    {openGroup === "분쟁 중" && ci === 2 && col.length === 2 && (() => {
                      const customGap = chipGap + disputeExtra;
                      const contentH = 2 * chipH + customGap;
                      const startY = (H - contentH) / 2;
                      const arrowTop = startY + chipH + 2;
                      const arrowBot = startY + chipH + customGap - 2;
                      const mx = 4;
                      return (
                        <svg width="8" height={H} style={{ position: "absolute", left: "50%", top: 0, transform: "translateX(-50%)", pointerEvents: "none", overflow: "visible", zIndex: 1 }}>
                          <line x1={mx} y1={arrowTop} x2={mx} y2={arrowBot - 3} stroke={C.g400} strokeWidth="1.5" />
                          <polygon points={`${mx},${arrowBot} ${mx - 3},${arrowBot - 5} ${mx + 3},${arrowBot - 5}`} fill={C.g400} />
                        </svg>
                      );
                    })()}
                  </div>
                  {ci < flow.length - 1 && !(openGroup === "계약 직후" && (ci === 0 || ci === flow.length - 2)) && !(openGroup === "만기 접근" && ci >= 2) && !(openGroup === "분쟁 중" && (ci === 1 || ci === 2 || ci === 3 || ci === 4 || ci === 5 || ci === 6)) && <FlowConn pN={col.length} nN={flow[ci + 1].length} H={H} gc={C.g300} />}
                  {/* 분쟁 중: b2a(1개) → [b2b, b21_compose](2개, 커스텀 gap) 커스텀 커넥터 */}
                  {openGroup === "분쟁 중" && ci === 1 && (() => {
                    const leftY = H / 2;
                    const customGap = chipGap + disputeExtra;
                    const contentH = 2 * chipH + customGap;
                    const startY = (H - contentH) / 2;
                    const rTop = startY + chipH / 2;
                    const rBot = startY + chipH + customGap + chipH / 2;
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        <line x1={0} y1={leftY} x2={connW / 2} y2={leftY} stroke={C.g300} strokeWidth={1.5} />
                        <line x1={connW / 2} y1={rTop} x2={connW / 2} y2={rBot} stroke={C.g300} strokeWidth={1.5} />
                        {[rTop, rBot].map((y, i) => (
                          <g key={i}>
                            <line x1={connW / 2} y1={y} x2={connW - aS} y2={y} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${y} ${connW - aS * 1.5},${y - aS} ${connW - aS * 1.5},${y + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 분쟁 중: [b2b, b21_compose](커스텀) → [b2b_agree, b21_preview](표준) 커스텀 커넥터 */}
                  {openGroup === "분쟁 중" && ci === 2 && (() => {
                    const customGap = chipGap + disputeExtra;
                    const contentH = 2 * chipH + customGap;
                    const startY = (H - contentH) / 2;
                    const lTop = startY + chipH / 2;
                    const lBot = startY + chipH + customGap + chipH / 2;
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {[[lTop, rYs[0]], [lBot, rYs[1]]].map(([ly, ry], i) => (
                          <g key={i}>
                            <line x1={0} y1={ly} x2={connW - aS} y2={ry} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${ry} ${connW - aS * 1.5},${ry - aS} ${connW - aS * 1.5},${ry + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 분쟁 중: [b2b_agree, b21_preview](2) → [b2b_agree_sent, b21_sent](2) 독립 병렬 */}
                  {openGroup === "분쟁 중" && ci === 3 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {lYs.map((y, i) => (
                          <g key={i}>
                            <line x1={0} y1={y} x2={connW - aS} y2={rYs[i]} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${rYs[i]} ${connW - aS * 1.5},${rYs[i] - aS} ${connW - aS * 1.5},${rYs[i] + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 분쟁 중: [b2b_agree_sent, b21_sent](2) → [home_agree_wait, home_dispute_sent](2) 독립 병렬 */}
                  {openGroup === "분쟁 중" && ci === 4 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {lYs.map((y, i) => (
                          <g key={i}>
                            <line x1={0} y1={y} x2={connW - aS} y2={rYs[i]} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${rYs[i]} ${connW - aS * 1.5},${rYs[i] - aS} ${connW - aS * 1.5},${rYs[i] + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 분쟁 중: [home_agree_wait, home_dispute_sent](2) → [b2b_return, b4](2) 독립 병렬 */}
                  {openGroup === "분쟁 중" && ci === 5 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {lYs.map((y, i) => (
                          <g key={i}>
                            <line x1={0} y1={y} x2={connW - aS} y2={rYs[i]} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${rYs[i]} ${connW - aS * 1.5},${rYs[i] - aS} ${connW - aS * 1.5},${rYs[i] + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 분쟁 중: [b2b_return, b4](2) → [__nav_done, b3_sc, b3_po, b3_med](4) 독립 경로 */}
                  {openGroup === "분쟁 중" && ci === 6 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(4, H);
                    const elbowX = 6;
                    const fanX = connW / 2 + 3;
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {/* b2b_return → __nav_done: ㄱ자 꺾임 (별도 x축) */}
                        <line x1={0} y1={lYs[0]} x2={elbowX} y2={lYs[0]} stroke={C.g300} strokeWidth={1.5} />
                        <line x1={elbowX} y1={lYs[0]} x2={elbowX} y2={rYs[0]} stroke={C.g300} strokeWidth={1.5} />
                        <line x1={elbowX} y1={rYs[0]} x2={connW - aS} y2={rYs[0]} stroke={C.g300} strokeWidth={1.5} />
                        <polygon points={`${connW},${rYs[0]} ${connW - aS * 1.5},${rYs[0] - aS} ${connW - aS * 1.5},${rYs[0] + aS}`} fill={C.g300} />
                        {/* b4 → b3_sc, b3_po, b3_med: 1-to-3 팬 (별도 x축) */}
                        <line x1={0} y1={lYs[1]} x2={fanX} y2={lYs[1]} stroke={C.g300} strokeWidth={1.5} />
                        <line x1={fanX} y1={rYs[1]} x2={fanX} y2={rYs[3]} stroke={C.g300} strokeWidth={1.5} />
                        {[rYs[1], rYs[2], rYs[3]].map((y, i) => (
                          <g key={i}>
                            <line x1={fanX} y1={y} x2={connW - aS} y2={y} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${y} ${connW - aS * 1.5},${y - aS} ${connW - aS * 1.5},${y + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 만기 접근: 분기 후 커스텀 커넥터 — 상단(퇴거) / 하단(연장) 병렬 경로 */}
                  {openGroup === "만기 접근" && ci === 2 && (() => {
                    const ys2 = calcYs(2, H);
                    const topY = ys2[0];
                    const botY = ys2[1];
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {/* 퇴거통보(top) → 퇴거발송확인(top) */}
                        <line x1={0} y1={topY} x2={connW - aS} y2={topY} stroke={C.g300} strokeWidth={1.5} />
                        <polygon points={`${connW},${topY} ${connW - aS * 1.5},${topY - aS} ${connW - aS * 1.5},${topY + aS}`} fill={C.g300} />
                        {/* 연장안내(bottom) → 하단 경로 시작 */}
                        <line x1={0} y1={botY} x2={connW} y2={botY} stroke={C.g300} strokeWidth={1.5} />
                      </svg>
                    );
                  })()}
                  {openGroup === "만기 접근" && ci === 3 && (() => {
                    const ys2 = calcYs(2, H);
                    const topY = ys2[0];
                    const botY = ys2[1];
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {/* 퇴거발송확인(top) → 홈 퇴거완료(top) */}
                        <line x1={0} y1={topY} x2={connW - aS} y2={topY} stroke={C.g300} strokeWidth={1.5} />
                        <polygon points={`${connW},${topY} ${connW - aS * 1.5},${topY - aS} ${connW - aS * 1.5},${topY + aS}`} fill={C.g300} />
                        {/* 연장안내 하단 경로 → 홈 대응후(bottom) */}
                        <line x1={0} y1={botY} x2={connW - aS} y2={botY} stroke={C.g300} strokeWidth={1.5} />
                        <polygon points={`${connW},${botY} ${connW - aS * 1.5},${botY - aS} ${connW - aS * 1.5},${botY + aS}`} fill={C.g300} />
                      </svg>
                    );
                  })()}
                  {/* 만기 접근: [home_exit_done, home_expiry_done](2) → [__nav_postexpiry, b1a_result](2) — 병렬 */}
                  {openGroup === "만기 접근" && ci === 4 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        {lYs.map((y, i) => (
                          <g key={i}>
                            <line x1={0} y1={y} x2={connW - aS} y2={rYs[i]} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${rYs[i]} ${connW - aS * 1.5},${rYs[i] - aS} ${connW - aS * 1.5},${rYs[i] + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 만기 접근: [__spacer, b1a_result](2) → [__nav_live, __nav_exit_back](2) — 하단→양쪽 분기 */}
                  {openGroup === "만기 접근" && ci === 5 && (() => {
                    const lYs = calcYs(2, H);
                    const rYs = calcYs(2, H);
                    return (
                      <svg width={connW} height={H} style={{ flexShrink: 0, display: "block" }}>
                        <line x1={0} y1={lYs[1]} x2={connW / 2} y2={lYs[1]} stroke={C.g300} strokeWidth={1.5} />
                        <line x1={connW / 2} y1={rYs[0]} x2={connW / 2} y2={rYs[1]} stroke={C.g300} strokeWidth={1.5} />
                        {rYs.map((y, i) => (
                          <g key={i}>
                            <line x1={connW / 2} y1={y} x2={connW - aS} y2={y} stroke={C.g300} strokeWidth={1.5} />
                            <polygon points={`${connW},${y} ${connW - aS * 1.5},${y - aS} ${connW - aS * 1.5},${y + aS}`} fill={C.g300} />
                          </g>
                        ))}
                      </svg>
                    );
                  })()}
                  {/* 계약 직후: 홈 → (+) Fork → 3 병렬 → 메인 플로우 ... → (+) Join → 보호 완료 */}
                  {openGroup === "계약 직후" && ci === 0 && (() => {
                    const bH = H;
                    const ys = calcYs(3, bH);
                    const midY = ys[1];
                    const gateR = 10;
                    return (
                      <>
                        {/* 홈 → (+) Fork 게이트 — SVG를 flex 자식으로 직접 배치 */}
                        <svg width={connW + gateR * 2 + connW} height={bH} style={{ flexShrink: 0, display: "block", overflow: "visible" }}>
                          {/* 인입 라인: x=0(홈 칩 바로 옆)부터 원 왼쪽까지 끊김 없이 */}
                          <line x1={0} y1={midY} x2={connW} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          {/* 삼갈래 수직 바 — 원 중심 관통 */}
                          <line x1={connW + gateR} y1={ys[0]} x2={connW + gateR} y2={ys[2]} stroke={C.g300} strokeWidth={1.5} />
                          {/* 수평 분기선 */}
                          {ys.map((y, i) => <line key={i} x1={connW + gateR} y1={y} x2={connW + gateR * 2 + connW} y2={y} stroke={C.g300} strokeWidth={1.5} />)}
                          {/* (+) 원 — 위에 덮기 */}
                          <circle cx={connW + gateR} cy={midY} r={gateR} fill={C.w} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW + gateR - 4} y1={midY} x2={connW + gateR + 4} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW + gateR} y1={midY - 4} x2={connW + gateR} y2={midY + 4} stroke={C.g300} strokeWidth={1.5} />
                        </svg>
                        {/* 3개 칩 열 */}
                        <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: chipGap, height: bH, flexShrink: 0, alignItems: "center" }}>
                          {[["a3", SCREENS.a3?.label], ["a4_1", SCREENS.a4_1?.label], ["a2", SCREENS.a2?.label]].map(([id, label]) => (
                            <button key={id} onClick={() => go(id)} style={{
                              padding: "4px 10px", borderRadius: 8, border: "none", cursor: "pointer",
                              ...T.s13(screen === id ? 600 : 400), whiteSpace: "nowrap", height: chipH,
                              background: screen === id ? gc : C.g100, color: screen === id ? C.w : C.g600,
                              transition: "all 0.15s", flexShrink: 0,
                            }}>{label}</button>
                          ))}
                        </div>
                        {/* 중간 칩(촬영 브리핑)에서만 다음으로 연결 */}
                        <FlowConn pN={1} nN={1} H={bH} gc={C.g300} />
                      </>
                    );
                  })()}
                  {/* 계약 직후: ... → 전송완료 → (+) Join → 보호완료 */}
                  {openGroup === "계약 직후" && ci === flow.length - 2 && (() => {
                    const bH = H;
                    const midY = bH / 2;
                    const gateR = 10;
                    return (
                      <svg width={connW + gateR * 2} height={bH} style={{ flexShrink: 0, display: "block", overflow: "visible" }}>
                          <line x1={0} y1={midY} x2={connW / 2} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW / 2 + gateR} y1={midY} x2={connW / 2 + gateR} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          <circle cx={connW / 2 + gateR} cy={midY} r={gateR} fill={C.w} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW / 2 + gateR - 4} y1={midY} x2={connW / 2 + gateR + 4} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW / 2 + gateR} y1={midY - 4} x2={connW / 2 + gateR} y2={midY + 4} stroke={C.g300} strokeWidth={1.5} />
                          <line x1={connW / 2 + gateR * 2} y1={midY} x2={connW + gateR * 2 - aS} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                          <polygon points={`${connW + gateR * 2},${midY} ${connW + gateR * 2 - aS * 1.5},${midY - aS} ${connW + gateR * 2 - aS * 1.5},${midY + aS}`} fill={C.g300} />
                        </svg>
                    );
                  })()}
                </React.Fragment>
              ))}
              {/* 계약 전: 검토 완료 뒤 분기 — 위: 계약 직후(그룹 전환), 아래: 중개사 추천 */}
              {openGroup === "계약 전" && (() => {
                const bH = H;
                const topY = bH / 2 - chipH / 2 - chipGap / 2;
                const botY = bH / 2 + chipH / 2 + chipGap / 2;
                const midY = bH / 2;
                return (
                  <>
                    <svg width={connW} height={bH} style={{ flexShrink: 0, display: "block" }}>
                      {/* 메인 실선 */}
                      <line x1={0} y1={midY} x2={connW / 2} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                      <line x1={connW / 2} y1={topY} x2={connW / 2} y2={botY} stroke={C.g300} strokeWidth={1.5} />
                      {/* 위: 계약 직후 — 실선 + 화살촉 */}
                      <line x1={connW / 2} y1={topY} x2={connW - aS} y2={topY} stroke={C.g300} strokeWidth={1.5} />
                      <polygon points={`${connW},${topY} ${connW - aS * 1.5},${topY - aS} ${connW - aS * 1.5},${topY + aS}`} fill={C.g300} />
                      {/* 아래: 중개사 추천 — 실선 + 화살촉 */}
                      <line x1={connW / 2} y1={botY} x2={connW - aS} y2={botY} stroke={C.g300} strokeWidth={1.5} />
                      <polygon points={`${connW},${botY} ${connW - aS * 1.5},${botY - aS} ${connW - aS * 1.5},${botY + aS}`} fill={C.g300} />
                    </svg>
                    <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: chipGap, height: bH, flexShrink: 0, alignItems: "center" }}>
                      {/* 그룹 전환 배지 — 계약 직후 색상 pill, 클릭 시 해당 그룹 열기 */}
                      <button onClick={() => setOpenGroup("계약 직후")} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none",
                        background: "linear-gradient(135deg, #e8f3ff, #c9e2ff)",
                        cursor: "pointer",
                        ...T.s13(500), whiteSpace: "nowrap", height: chipH,
                        color: C.b700,
                        transition: "all 0.15s", flexShrink: 0,
                        display: "flex", alignItems: "center", gap: 4,
                      }}>
                        계약 직후
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.b700} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                      <button onClick={() => go("agent_rec")} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none", cursor: "pointer",
                        ...T.s13(screen === "agent_rec" ? 600 : 400), whiteSpace: "nowrap", height: chipH,
                        background: screen === "agent_rec" ? gc : C.g100,
                        color: screen === "agent_rec" ? C.w : C.g600,
                        transition: "all 0.15s", flexShrink: 0,
                      }}>{SCREENS.agent_rec?.label}</button>
                    </div>
                  </>
                );
              })()}
              {/* 계약 직후: 보호 완료 뒤 → 거주 중 그룹 전환 */}
              {openGroup === "계약 직후" && (() => {
                const bH = H;
                const midY = bH / 2;
                return (
                  <>
                    <svg width={connW} height={bH} style={{ flexShrink: 0, display: "block" }}>
                      <line x1={0} y1={midY} x2={connW - aS} y2={midY} stroke={C.g300} strokeWidth={1.5} />
                      <polygon points={`${connW},${midY} ${connW - aS * 1.5},${midY - aS} ${connW - aS * 1.5},${midY + aS}`} fill={C.g300} />
                    </svg>
                    <div style={{ display: "flex", alignItems: "center", height: bH, flexShrink: 0 }}>
                      <button onClick={() => go("home_live")} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none",
                        background: "linear-gradient(135deg, #e8f3ff, #c9e2ff)",
                        cursor: "pointer",
                        ...T.s13(500), whiteSpace: "nowrap", height: chipH,
                        color: C.b700,
                        transition: "all 0.15s", flexShrink: 0,
                        display: "flex", alignItems: "center", gap: 4,
                      }}>
                        거주 중
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.b700} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                    </div>
                  </>
                );
              })()}
              {/* 만기 도래: 계약 마무리 → 계약 전, 미반환 안내 → 분쟁 중 그룹 전환 */}
              {openGroup === "만기 도래" && (() => {
                const bH = H;
                const ys2 = calcYs(2, bH);
                const topY = ys2[0];
                const botY = ys2[1];
                return (
                  <>
                    <svg width={connW} height={bH} style={{ flexShrink: 0, display: "block" }}>
                      <line x1={0} y1={topY} x2={connW - aS} y2={topY} stroke={C.g300} strokeWidth={1.5} />
                      <polygon points={`${connW},${topY} ${connW - aS * 1.5},${topY - aS} ${connW - aS * 1.5},${topY + aS}`} fill={C.g300} />
                      <line x1={0} y1={botY} x2={connW - aS} y2={botY} stroke={C.g300} strokeWidth={1.5} />
                      <polygon points={`${connW},${botY} ${connW - aS * 1.5},${botY - aS} ${connW - aS * 1.5},${botY + aS}`} fill={C.g300} />
                    </svg>
                    <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: chipGap, height: bH, flexShrink: 0, alignItems: "center" }}>
                      <button onClick={() => go("home_pre")} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none",
                        background: "linear-gradient(135deg, #e8f3ff, #c9e2ff)",
                        cursor: "pointer",
                        ...T.s13(500), whiteSpace: "nowrap", height: chipH,
                        color: C.b700, transition: "all 0.15s", flexShrink: 0,
                        display: "flex", alignItems: "center", gap: 4,
                      }}>
                        계약 전
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.b700} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                      <button onClick={() => go("home_dispute")} style={{
                        padding: "4px 10px", borderRadius: 8, border: "none",
                        background: "linear-gradient(135deg, #e8f3ff, #c9e2ff)",
                        cursor: "pointer",
                        ...T.s13(500), whiteSpace: "nowrap", height: chipH,
                        color: C.b700, transition: "all 0.15s", flexShrink: 0,
                        display: "flex", alignItems: "center", gap: 4,
                      }}>
                        분쟁 중
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.b700} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                    </div>
                  </>
                );
              })()}
            </div>
          );
        })()}
      </div>

      {/* ─── 디바이스 프레임 ─── */}
      <div className="device-outer">
        <div className="device-frame">
          <div key={resetKey} className="no-scrollbar" style={{ display: "flex", flexDirection: "column", flex: 1, overflowY: "auto" }}>
            {screenMap[screen]}
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
